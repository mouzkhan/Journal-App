<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProJournal | Enterprise Note Taking</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Toast Notifications -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f3f4f6;
            --bg-panel: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body.dark {
            --bg-body: #111827;
            --bg-panel: #1f2937;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --border: #374151;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
        }

        .sidebar {
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
        }

        .search-bar {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        .search-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .entry-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .entry-item {
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .entry-item:hover { background: var(--bg-body); }
        .entry-item.active { background: var(--bg-body); border-color: var(--primary); }

        .entry-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .entry-title {
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .entry-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            position: relative;
        }

        .editor-toolbar {
            padding: 15px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toolbar-group {
            display: flex;
            gap: 10px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn:hover { background: var(--bg-body); }
        .btn-primary { background: var(--primary); color: white; border: none; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { color: var(--danger); border-color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .input-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .title-input {
            font-size: 2rem;
            font-weight: 700;
            border: none;
            background: transparent;
            color: var(--text-main);
            width: 100%;
        }

        .mood-selector {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: var(--bg-body);
            border-radius: 8px;
            width: fit-content;
        }

        .mood-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.5;
            transition: transform 0.2s;
        }
        .mood-btn:hover, .mood-btn.selected { transform: scale(1.2); opacity: 1; }

        textarea#journalText {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            font-family: var(--font-mono);
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-main);
            background: transparent;
        }

        .preview-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            border-left: 1px solid var(--border);
            background: var(--bg-body);
            display: none;
        }
        
        .preview-area.active { display: block; }

        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 1em; margin-bottom: 0.5em; color: var(--text-main); }
        .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
        .markdown-body blockquote { border-left: 4px solid var(--primary); padding-left: 1em; color: var(--text-muted); }
        .markdown-body code { background: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 4px; font-family: var(--font-mono); }
        .markdown-body pre { background: rgba(0,0,0,0.1); padding: 10px; border-radius: 6px; overflow-x: auto; }

        .stats-bar {
            padding: 10px 30px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .app-container { grid-template-columns: 1fr; }
            .sidebar { display: none; position: absolute; height: 100%; width: 80%; box-shadow: var(--shadow); transform: translateX(-100%); }
            .sidebar.open { display: flex; transform: translateX(0); }
            .editor-toolbar { padding: 15px; }
            .input-area, .preview-area { padding: 20px; }
            .title-input { font-size: 1.5rem; }
            .mobile-toggle { display: block; }
        }
        @media (min-width: 769px) { .mobile-toggle { display: none; } }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 10px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <i class="ph ph-book-open-text"></i> ProJournal
            </div>
            <button class="btn" id="closeSidebar" style="display:none;"><i class="ph ph-x"></i></button>
        </div>
        
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search entries...">
        </div>

        <div class="entry-list" id="entryList">
            <div class="empty-state">
                <i class="ph ph-book-open"></i>
                <p>No entries yet</p>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="editor-toolbar">
            <div class="toolbar-group">
                <button class="btn mobile-toggle" id="openSidebar"><i class="ph ph-list"></i></button>
                <button class="btn" id="togglePreview"><i class="ph ph-eye"></i> Preview</button>
            </div>
            <div class="toolbar-group">
                <button class="btn" id="exportBtn"><i class="ph ph-download-simple"></i> Export</button>
                <button class="btn" id="themeToggle"><i class="ph ph-moon"></i></button>
                <button class="btn btn-danger" id="deleteBtn"><i class="ph ph-trash"></i></button>
                <button class="btn btn-primary" id="saveBtn"><i class="ph ph-floppy-disk"></i> Save</button>
            </div>
        </div>

        <div class="editor-container">
            <div class="input-area">
                <input type="text" class="title-input" id="titleInput" placeholder="Untitled Entry">
                
                <div class="mood-selector" id="moodSelector">
                    <button class="mood-btn" data-mood="😔">😔</button>
                    <button class="mood-btn" data-mood="😐">😐</button>
                    <button class="mood-btn" data-mood="🙂">🙂</button>
                    <button class="mood-btn" data-mood="😄">😄</button>
                    <button class="mood-btn" data-mood="🤩">🤩</button>
                </div>

                <textarea id="journalText" placeholder="Start writing your thoughts here..."></textarea>
            </div>

            <div class="preview-area" id="previewArea">
                <div class="markdown-body" id="markdownOutput"></div>
            </div>
        </div>

        <div class="stats-bar">
            <span id="wordCount">0 words</span>
            <span id="charCount">0 chars</span>
            <span id="lastSaved">Not saved</span>
        </div>
    </main>
</div>
<script>
    class JournalApp {
        constructor() {
            this.entries = [];
            this.currentEntryId = null;
            this.selectedMood = null;
            this.saveTimeout = null;
            
            this.dom = {
                sidebar: document.getElementById('sidebar'),
                entryList: document.getElementById('entryList'),
                titleInput: document.getElementById('titleInput'),
                textInput: document.getElementById('journalText'),
                previewArea: document.getElementById('previewArea'),
                markdownOutput: document.getElementById('markdownOutput'),
                searchInput: document.getElementById('searchInput'),
                moodSelector: document.getElementById('moodSelector'),
                wordCount: document.getElementById('wordCount'),
                charCount: document.getElementById('charCount'),
                lastSaved: document.getElementById('lastSaved'),
                themeToggle: document.getElementById('themeToggle')
            };

            this.init();
        }

        init() {
            try {
                const stored = localStorage.getItem('journalEntries');
                if (stored) {
                    this.entries = JSON.parse(stored);
                }
            } catch (e) {
                console.error('Error loading entries:', e);
                this.entries = [];
            }

            this.loadTheme();
            this.renderList();
            this.setupEventListeners();
            
                this.dom.textInput.addEventListener('input', () => {
                    this.updateStats();
                    this.updatePreview();
                    this.dom.lastSaved.textContent = "Auto-saving...";
                    clearTimeout(this.saveTimeout);
                    this.saveTimeout = setTimeout(() => this.saveCurrentEntry(), 1000);
                });

            this.dom.titleInput.addEventListener('input', () => {
                this.updateStats();
                this.saveCurrentEntry();
            });
        }

        setupEventListeners() {
            document.getElementById('saveBtn').addEventListener('click', () => {
                this.saveCurrentEntry();
                this.showToast('Entry saved successfully', 'success');
            });

            document.getElementById('deleteBtn').addEventListener('click', () => {
                if(confirm('Are you sure you want to delete this entry?')) {
                    this.deleteEntry(this.currentEntryId);
                }
            });

            document.getElementById('togglePreview').addEventListener('click', () => {
                this.dom.previewArea.classList.toggle('active');
            });

            this.dom.searchInput.addEventListener('input', (e) => {
                this.renderList(e.target.value);
            });

            this.dom.themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                this.dom.themeToggle.innerHTML = isDark ? '<i class="ph ph-sun"></i>' : '<i class="ph ph-moon"></i>';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            });

            this.dom.moodSelector.addEventListener('click', (e) => {
                if (e.target.classList.contains('mood-btn')) {
                    document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
                    e.target.classList.add('selected');
                    this.selectedMood = e.target.dataset.mood;
                    this.saveCurrentEntry();
                }
            });

            document.getElementById('openSidebar').addEventListener('click', () => {
                this.dom.sidebar.classList.add('open');
                document.getElementById('closeSidebar').style.display = 'block';
            });

            document.getElementById('closeSidebar').addEventListener('click', () => {
                this.dom.sidebar.classList.remove('open');
                document.getElementById('closeSidebar').style.display = 'none';
            });

                        document.getElementById('exportBtn').addEventListener('click', () => {
                this.exportData();
            });
        }

        renderList(filter = '') {
            this.dom.entryList.innerHTML = '';
            
            const filteredEntries = this.entries.filter(entry => 
                entry.title.toLowerCase().includes(filter.toLowerCase()) || 
                entry.text.toLowerCase().includes(filter.toLowerCase())
            ).sort((a, b) => b.timestamp - a.timestamp);

            if (filteredEntries.length === 0) {
                this.dom.entryList.innerHTML = `
                    <div class="empty-state">
                        <i class="ph ph-book-open"></i>
                        <p>${filter ? 'No entries found' : 'No entries yet'}</p>
                    </div>`;
                return;
            }

            filteredEntries.forEach(entry => {
                const div = document.createElement('div');
                div.className = `entry-item ${entry.id === this.currentEntryId ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="entry-meta">
                        <span>${new Date(entry.timestamp).toLocaleDateString()}</span>
                        <span>${entry.mood || '😐'}</span>
                    </div>
                    <div class="entry-title">${entry.title || 'Untitled Entry'}</div>
                    <div class="entry-preview">${entry.text.substring(0, 50)}...</div>
                `;
                div.addEventListener('click', () => this.loadEntry(entry.id));
                this.dom.entryList.appendChild(div);
            });
        }

        saveCurrentEntry() {
            const title = this.dom.titleInput.value.trim();
            const text = this.dom.textInput.value;
            
            if (!title && !text) return;

            if (this.currentEntryId) {
                const index = this.entries.findIndex(e => e.id === this.currentEntryId);
                if (index !== -1) {
                    this.entries[index] = {
                        ...this.entries[index],
                        title,
                        text,
                        mood: this.selectedMood,
                        timestamp: Date.now()
                    };
                }
            } else {
                const newEntry = {
                    id: Date.now(),
                    title,
                    text,
                    mood: this.selectedMood,
                    timestamp: Date.now()
                };
                this.entries.push(newEntry);
                this.currentEntryId = newEntry.id;
            }

            try {
                localStorage.setItem('journalEntries', JSON.stringify(this.entries));
                this.dom.lastSaved.textContent = "Saved just now";
                this.renderList(this.dom.searchInput.value);
            } catch (e) {
                console.error('Error saving entry:', e);
                this.showToast('Error saving entry', 'error');
            }
        }

        loadEntry(id) {
            const entry = this.entries.find(e => e.id === id);
            if (entry) {
                this.currentEntryId = id;
                this.dom.titleInput.value = entry.title;
                this.dom.textInput.value = entry.text;
                this.selectedMood = entry.mood;
                
                document.querySelectorAll('.mood-btn').forEach(btn => {
                    btn.classList.toggle('selected', btn.dataset.mood === entry.mood);
                });

                this.updateStats();
                    this.updatePreview();
                this.renderList(this.dom.searchInput.value);
                
                if (window.innerWidth <= 768) {
                    this.dom.sidebar.classList.remove('open');
                    document.getElementById('closeSidebar').style.display = 'none';
                }
            }
        }
        updatePreview() {
            const text = this.dom.textInput.value;
            this.dom.markdownOutput.innerHTML = marked.parse(text);
        }

        deleteEntry(id) {
            this.entries = this.entries.filter(e => e.id !== id);
            try {
                localStorage.setItem('journalEntries', JSON.stringify(this.entries));
            } catch (e) {
                console.error('Error deleting entry:', e);
            }
            
            if (this.currentEntryId === id) {
                this.dom.titleInput.value = '';
                this.dom.textInput.value = '';
                this.currentEntryId = null;
                this.selectedMood = null;
                document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
                    this.updatePreview();
            }
            
            this.renderList(this.dom.searchInput.value);
            this.showToast('Entry deleted', 'error');
        }

        updateStats() {
            const text = this.dom.textInput.value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const chars = text.length;
            
            this.dom.wordCount.textContent = `${words} words`;
            this.dom.charCount.textContent = `${chars} chars`;
        }

        exportData() {
            try {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.entries));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "journal_backup_" + new Date().toISOString().slice(0,10) + ".json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                this.showToast('Backup downloaded', 'success');
            } catch (e) {
                console.error('Error exporting data:', e);
                this.showToast('Error exporting data', 'error');
            }
        }

        loadTheme() {
            try {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme === 'dark') {
                    document.body.classList.add('dark');
                    this.dom.themeToggle.innerHTML = '<i class="ph ph-sun"></i>';
                }
            } catch (e) {
                console.error('Error loading theme:', e);
            }
        }

        showToast(message, type = 'success') {
            try {
                Toastify({
                    text: message,
                    duration: 3000,
                    gravity: "top", 
                    position: "right", 
                    style: {
                        background: type === 'success' ? 'var(--success)' : 'var(--danger)',
                        borderRadius: "8px",
                        color: "#fff"
                    }
                }).showToast();
            } catch (e) {
                console.error('Error showing toast:', e);
            }
        }
    }

    // Initialize App
    document.addEventListener('DOMContentLoaded', () => {
        try {
            new JournalApp();
        } catch (e) {
            console.error('Error initializing app:', e);
        }
    });
</script>
</body>
</html>
